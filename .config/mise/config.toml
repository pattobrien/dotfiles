[settings]
npm.package_manager = "pnpm"
experimental = true
idiomatic_version_file_enable_tools = ["node"]

[tools]
lua-language-server = "latest"
neovim = "0.12.2"
node = "24"
"npm:@ecrindigital/facet-cli" = "0.2"
"npm:@open-pencil/cli" = "latest"
"npm:@posthog/cli" = "latest"
"npm:codemod" = "latest"
"npm:eas-cli" = "latest"
"npm:figma-use" = "0.13.1"
"npm:neonctl" = "latest"
"npm:odiff-bin" = "latest"
"npm:oxfmt" = "latest"
"npm:oxlint" = "latest"
"npm:turbo" = "latest"
"npm:vite-plus" = "latest"
pnpm = "10.26.2"
swift = "6.2.4"
# yarn = "latest"
# Global tools are managed in .tool-versions, so leave this empty
# or add any tools you want available globally but not in .tool-versions

[tasks.dotfiles]
description = "Navigate to dotfiles"
run = "cd ~/.dotfiles && exec $SHELL"
