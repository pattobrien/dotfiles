# Menu bar clock settings
# Apply with: macos-defaults apply ~/.config/macos-defaults/menubar-clock.yaml
---
description: Menu bar clock
sudo: false
current_host: false
kill: [ControlCenter]
data:
  com.apple.menuextra.clock:
    IsAnalog: false
    ShowDayOfWeek: true
    ShowDate: 1 # 1 = always show
    ShowAMPM: true
    ShowSeconds: false
    # Show24Hour is a no-op here; 24-hour lives in NSGlobalDomain AppleICUForce24HourTime
