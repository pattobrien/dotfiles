# Dock settings
# Apply with: macos-defaults apply ~/.config/macos-defaults/dock.yaml
---
# Label for this config block (for reference only)
description: Dock settings
# Whether these settings require sudo to apply
sudo: false
# Whether to use ByHost preferences (machine-specific settings)
current_host: false
# Processes to restart after applying changes (to make them take effect)
kill: [Dock]
data:
  com.apple.dock:
    # Automatically hide the dock when not in use
    autohide: true
    # Size of icons when magnified (hovering over them)
    largesize: 128.0
    # Disable the bouncing animation when launching apps
    launchanim: false
    # Minimize windows into their app icon instead of separate dock items
    minimize-to-application: true
    # Don't automatically rearrange Spaces based on most recent use
    mru-spaces: false
    # Allow app icons to bounce to get attention (false = disable bouncing)
    no-bouncing: false
    # Enable App Expose gesture (swipe down on trackpad to show app windows)
    showAppExposeGestureEnabled: true
    # Default size of dock icons in pixels
    tilesize: 58.0
    # Hot corner: bottom-right action (1 = disabled)
    wvous-br-corner: 1
    # Hot corner: bottom-right modifier key (0 = none)
    wvous-br-modifier: 0
