set-option -g default-terminal "tmux-256color"

# clipboard (OSC 52) depends on outer terminal support; declare it explicitly
set -ga terminal-features '*:clipboard'

# undercurl + colored underlines (SGR 4:3 / 58) — for nvim diagnostic squiggles.
# `usstyle` tells tmux to handle the codes; `Smulx` / `Setulc` extend the inner
# terminfo so nvim actually queries support and emits SGR 4:3 / 58.
set -ga terminal-features '*:usstyle'
set -ga terminal-features '*:hyperlinks'
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# faster escape (important for nvim)
set -s escape-time 0

# forward focus events to apps (needed by Claude Code, nvim autoread)
set -g focus-events on

# set prefix to C-a
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

unbind %
bind | split-window -h

unbind '"'
bind - split-window -v

unbind r
bind r source-file ~/.tmux.conf

bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

bind -r m resize-pane -Z

set -g mouse on

set -g status-left-length 40

# start window numbering at 1 (easier to reach)
set -g base-index 1
setw -g pane-base-index 1

# renumber windows when one is closed
set -g renumber-windows on
set-window-option -g mode-keys vi

# vi copy mode: v to select, y to yank to system clipboard
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
# keep selection after mouse drag (so you can copy with y)
unbind -T copy-mode-vi MouseDragEnd1Pane

# activity monitoring (for CC notifications)
setw -g monitor-activity on
set -g visual-activity off

# forward extended keys (kitty keyboard protocol) so Shift+Enter works in Claude Code
# NOTE: use "on" not "always" — "always" causes tmux to re-encode terminal
# capability responses (DCS/XTVERSION) as extended-key sequences, which leaks
# garbled text into apps like fzf-lua. "on" only activates when the client
# terminal negotiates support. See: https://github.com/tmux/tmux/issues/4386
set -g extended-keys on
set -as terminal-features 'xterm*:extkeys'

# tmux recognizes Shift+Enter as S-Enter, but does not reliably forward the
# CSI-u sequence Codex expects. Re-emit the kitty keyboard protocol bytes.
bind-key -n S-Enter send-keys Escape "[13;2u"

# NOTE: PLUGINS ARE INSTALLED BY RUNNING: Prefix + SHIFT + I
set -g @plugin 'tmux-plugins/tpm' # plugin manager

set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes

set -g @catppuccin_flavour 'mocha' # latte, frappe, macchiato, mocha

# hide date/time from the right side of the status bar
set -g status-right ""

# Normalize Codex's architecture-specific executable name in auto-renamed windows.
set -g automatic-rename-format '#{?pane_in_mode,[tmux],#{?#{m:codex-aarch64-*,#{pane_current_command}},codex,#{pane_current_command}}}#{?pane_dead,[dead],}'

# show window name instead of pane title (hostname) in window tabs
set -g @catppuccin_window_text " #{?#{==:#{pane_current_path},#{session_path}},#W,#W:#{b:pane_current_path}}"
set -g @catppuccin_window_current_text " #{?#{==:#{pane_current_path},#{session_path}},#W,#W:#{b:pane_current_path}}"
set -g @resurrect-capture-pane-contents 'on' # allow tmux-ressurect to capture pane contents
set -g @continuum-restore 'on' # enable tmux-continuum functionality

# Cmd+key shortcuts (received as F-key escape sequences from Kitty/Ghostty).
# See README.md § Keyboard Shortcuts.
bind-key -n F12 send-keys -R C-l \; run-shell "sleep 0.05" \; clear-history       # Cmd+K: clear screen
bind-key -n F11 display-popup -E -w 90% -h 90% "workmux dashboard"                # Cmd+E: workmux dashboard
# bind-key -n F10 display-popup -E -w 80% -h 60% "wt list --pick"                 # Cmd+L: wt list (current project) — moved to Hammerflow Hyper+W+L; F10/Cmd+L reserved for logger window role
bind-key -n F9  display-popup -E -w 60% -h 60% "~/.dotfiles/scripts/tmux-session-picker" # Cmd+Shift+R: fzf session picker
bind-key -n F8  last-window                                                        # Cmd+;: toggle last tmux window
bind-key -n F7  display-popup -E -w 80% -h 80%                                     # Cmd+/: scratch popup shell
bind-key -n F6  source-file ~/.tmux.conf                                           # Cmd+R: reload tmux config
bind-key -n F2  new-window                                                         # Cmd+T: new tmux window
bind-key -n F3  kill-pane                                                          # Cmd+W: kill tmux pane
bind-key -n F4  resize-pane -Z                                                     # Cmd+Enter: toggle pane zoom

# Role-based window jumps. The role mnemonic (A/N/L/S) is independent of the
# actual window name being matched. `:=NAME` is exact-match; if missing, tmux errors.
bind-key -n F5  run-shell "~/.dotfiles/scripts/tmux-jump-or-create claude"        # Cmd+A: ai role -> first "claude" window or new "claude" window
# F10 was previously bound to `wt list`; reused for logger role.
# Pattern-match (pnpm dev*) + create-on-miss handled by helper script.
bind-key -n F10 run-shell "~/.dotfiles/scripts/tmux-jump-dev"                      # Cmd+L: logger role -> "pnpm dev*" window or new shell

# Cmd+N and Cmd+S use extended F-key sequences (past F12) via tmux user-keys.
set -s user-keys[0] "\e[25~"
set -s user-keys[1] "\e[26~"
bind-key -n User0 run-shell "~/.dotfiles/scripts/tmux-jump-or-create nvim nvim"   # Cmd+N: nvim role -> "nvim" window or new window running nvim
bind-key -n User1 run-shell "~/.dotfiles/scripts/tmux-jump zsh"                    # Cmd+S: shell role -> first "zsh" window (no create-on-miss)

# Cmd+1..9 → window-by-index. Useful when role-based bindings can't disambiguate
# (e.g. multiple windows named "claude"). base-index=1 means digits line up with the status bar.
set -s user-keys[2]  "\e[28~"
set -s user-keys[3]  "\e[29~"
set -s user-keys[4]  "\e[31~"
set -s user-keys[5]  "\e[32~"
set -s user-keys[6]  "\e[33~"
set -s user-keys[7]  "\e[34~"
set -s user-keys[8]  "\e[36~"
set -s user-keys[9]  "\e[37~"
set -s user-keys[10] "\e[38~"
bind-key -n User2  select-window -t :1                                             # Cmd+1
bind-key -n User3  select-window -t :2                                             # Cmd+2
bind-key -n User4  select-window -t :3                                             # Cmd+3
bind-key -n User5  select-window -t :4                                             # Cmd+4
bind-key -n User6  select-window -t :5                                             # Cmd+5
bind-key -n User7  select-window -t :6                                             # Cmd+6
bind-key -n User8  select-window -t :7                                             # Cmd+7
bind-key -n User9  select-window -t :8                                             # Cmd+8
bind-key -n User10 select-window -t :9                                             # Cmd+9

# Cmd+Shift+* → tmux *session* navigation (across-session namespace).
# F9 above is reused for the session picker; the rest use fresh user-keys.
set -s user-keys[11] "\e[39~"
set -s user-keys[12] "\e[40~"
set -s user-keys[13] "\e[41~"
set -s user-keys[14] "\e[42~"
set -s user-keys[15] "\e[43~"
bind-key -n User11 switch-client -l                                                # Cmd+Shift+;: toggle last session
bind-key -n User12 switch-client -t dotfiles                                       # Cmd+Shift+D: dotfiles session
bind-key -n User13 switch-client -t notes                                          # Cmd+Shift+N: notes session
bind-key -n User14 switch-client -t main                                           # Cmd+Shift+M: main session

# Track session-switch frecency so the Cmd+Shift+R picker can rank by recent+frequent use.
set-hook -g client-session-changed "run-shell '~/.dotfiles/scripts/tmux-frecency-record \"#{client_session}\"'"

# Cmd+? (Cmd+Shift+/) → cheatsheet menu of all custom Cmd+* / Cmd+Shift+* shortcuts.
# Selecting an item also runs it (so the menu doubles as an entry point).
# Keep this in sync whenever a Cmd+* binding above changes.
bind-key -n User15 display-menu -T "#[align=centre] Shortcuts " -x C -y C \
  "#[fg=yellow]Windows (in-session)" "" "" \
  "Cmd+T   new window"              t "new-window" \
  "Cmd+W   kill pane"               w "kill-pane" \
  "Cmd+Enter  zoom pane"            z "resize-pane -Z" \
  "Cmd+;   toggle last window"      "'" "last-window" \
  "Cmd+1..9   jump to window N"     ""  "" \
  "Cmd+A   → claude window"         a "run-shell '~/.dotfiles/scripts/tmux-jump-or-create claude'" \
  "Cmd+N   → nvim window"           n "run-shell '~/.dotfiles/scripts/tmux-jump-or-create nvim nvim'" \
  "Cmd+S   → zsh window"            s "run-shell '~/.dotfiles/scripts/tmux-jump zsh'" \
  "Cmd+L   → pnpm dev window"       l "run-shell '~/.dotfiles/scripts/tmux-jump-dev'" \
  "" \
  "#[fg=yellow]Sessions (cross-session)" "" "" \
  "Cmd+Shift+;   toggle last session"  ":" "switch-client -l" \
  "Cmd+Shift+R   session picker"       r "display-popup -E -w 60% -h 60% '~/.dotfiles/scripts/tmux-session-picker'" \
  "Cmd+Shift+M   → main"               M "switch-client -t main" \
  "Cmd+Shift+D   → dotfiles"           D "switch-client -t dotfiles" \
  "Cmd+Shift+N   → notes"              N "switch-client -t notes" \
  "" \
  "#[fg=yellow]Popups & Utilities" "" "" \
  "Cmd+E   workmux dashboard"          e "display-popup -E -w 90% -h 90% 'workmux dashboard'" \
  "Cmd+/   scratch popup"              "/" "display-popup -E -w 80% -h 80%" \
  "Cmd+K   clear screen"               k "send-keys -R C-l" \
  "Cmd+R   reload tmux config"         R "source-file ~/.tmux.conf" \
  "Cmd+?   this cheatsheet"            ?  ""

# Disabled (custom workflow shortcuts; rebind in Hammerflow if you still want them):
# bind-key -n F7 display-popup -E -w 80% -h 60% "wt cleanup"                       # Cmd+Shift+D: cleanup worktrees
# bind-key -n F6 display-popup -E -w 80% -h 60% "wt dev kill"                      # Cmd+Shift+K: kill dev processes
# bind-key -n F5 display-popup -E -w 80% -h 60% "wt dev list --pick"               # Cmd+Shift+P: list dev processes
# bind-key -n F4 run-shell "wt dev start"                                           # Cmd+Shift+R: start dev in session

# Initialize TMUX plugin manager (keep this line at very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
