name: VS Code Extension Diagnostic

# Isolate why bulk `code --install-extension` cascade-fails on the runner.
# A clean control (cask VS Code, never opened, NO base-install state) installed
# fine — so it's NOT "never opened" and NOT volume. This run adds the two things
# that control omitted vs the real `./install personal`:
#   1. the base install's ~/Library/Application Support/Code/User symlinks, and
#   2. de-quarantines VS Code (scripts/dequarantine.zsh) so we can ALSO test
#      whether opening the app first (now that the Gatekeeper popup is gone)
#      lets the extensions install.
# Manual/own-branch only, so it never triggers the main validation.
on:
  push:
    branches: [vscode-diag]
  workflow_dispatch:

concurrency:
  group: vscode-diagnostic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: namespace-profile-mac
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v5

      - name: "Build extension id list (first 100, minus the dead id)"
        run: |
          set -euxo pipefail
          grep -E '^vscode ' brew/personal/Brewfile \
            | sed -E 's/^vscode "(.*)"$/\1/' \
            | grep -v 'ms-vsliveshare.vsliveshare-pack' \
            | head -100 > /tmp/ext-ids.txt
          echo "testing with $(wc -l < /tmp/ext-ids.txt) extensions"

      - name: "Install VS Code cask (un-opened), then de-quarantine via the real script"
        run: |
          set -euxo pipefail
          /opt/homebrew/bin/brew install --cask visual-studio-code
          echo "/opt/homebrew/bin" >> "$GITHUB_PATH"
          ./scripts/dequarantine.zsh

      - name: "Replicate base install's Code User symlinks (the variable the clean control omitted)"
        run: |
          set -euxo pipefail
          mkdir -p "$HOME/Library/Application Support/Code/User"
          for f in settings.json keybindings.json tasks.json; do
            src="$GITHUB_WORKSPACE/vscode/Library/Application Support/Code/User/$f"
            [ -e "$src" ] && ln -sf "$src" "$HOME/Library/Application Support/Code/User/$f"
          done
          ls -la "$HOME/Library/Application Support/Code/User/"

      - name: "A. CONTROL — symlinks present, NO open, install all"
        run: |
          set +e
          rm -rf "$HOME/.vscode/extensions"
          while read -r id; do code --install-extension "$id"; done < /tmp/ext-ids.txt > /tmp/ctrl.log 2>&1
          echo "=== CONTROL (symlinks, no open) ==="
          echo "successfully installed: $(grep -c 'was successfully installed' /tmp/ctrl.log)"
          echo "cascade errors:         $(grep -ciE 'Cannot read the extension|extensions\.json|ENOTEMPTY|\.obsolete|EntryNotFound' /tmp/ctrl.log)"
          grep -iE 'Cannot read the extension|extensions\.json|ENOTEMPTY|\.obsolete|EntryNotFound|Failed Installing' /tmp/ctrl.log | sort -u | head -20
          exit 0

      - name: "B. TEST — symlinks present, OPEN VS Code first (no popup now), install all"
        run: |
          set +e
          rm -rf "$HOME/.vscode/extensions"
          echo "## opening VS Code (de-quarantined, so no Gatekeeper prompt)"
          open -a "Visual Studio Code"
          sleep 25
          echo "## state after open:"; ls -la "$HOME/.vscode/extensions" 2>&1
          cat "$HOME/.vscode/extensions/extensions.json" 2>&1 | head -c 200; echo
          osascript -e 'tell application "Visual Studio Code" to quit' 2>&1
          sleep 3
          while read -r id; do code --install-extension "$id"; done < /tmp/ext-ids.txt > /tmp/test.log 2>&1
          echo "=== TEST (symlinks, opened first) ==="
          echo "successfully installed: $(grep -c 'was successfully installed' /tmp/test.log)"
          echo "cascade errors:         $(grep -ciE 'Cannot read the extension|extensions\.json|ENOTEMPTY|\.obsolete|EntryNotFound' /tmp/test.log)"
          grep -iE 'Cannot read the extension|extensions\.json|ENOTEMPTY|\.obsolete|EntryNotFound|Failed Installing' /tmp/test.log | sort -u | head -20
          exit 0
