  "@types/node": ^24
  "@typescript/native-preview": ^7.0.0-dev.20260403.1
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@0.2.1
  vite-plus: 0.2.1
  vitest: 4.1.9
  zod: ^4

catalogMode: strict

overrides:
  vite: "catalog:"
  vitest: "catalog:"

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
