packages:
  - packages/*
  - tools/*
  - tests/*
  - claude-plugins/meagain/hooks
  - "!tools/picker"

catalog:
  "@msgpack/msgpack": ^3.1.3
  "@types/node": ^24
  "@typescript/native-preview": ^7.0.0-dev.20260309.1
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@^0.1.15
  zod: ^4

catalogMode: strict

overrides:
  vite: "catalog:"
  vitest: "catalog:"

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
