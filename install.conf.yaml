- defaults:
    link:
      relink: true
      create: true
    shell:
      stderr: true
      stdout: true
      stdin: true

- clean:
    - "~"
    - "~/.oh-my-zsh/custom/"
    - "~/.oh-my-zsh/custom/plugins/"

# Back up pre-existing real dotfiles (e.g. a stock ~/.zshenv) before linking.
- shell:
    - command: ./scripts/backup_dotfiles.zsh
      description: Backing up pre-existing dotfiles before linking

- link:
    ~/.tool-versions: .config/asdf/.tool-versions
    ~/.claude/CLAUDE.md: claude/CLAUDE.md
    ~/.claude/settings.json: claude/settings.json
    ~/.claude/skills: claude/skills
    ~/.agents: .agents
    ~/.codex/config.toml: .config/codex/config.toml
    ~/.codex/AGENTS.md:
      path: .config/codex/AGENTS.md
    ~/.tmux.conf: .config/tmux/.tmux.conf
    ~/.ssh/config: .config/ssh/config
    ~/.hushlogin: hushlogin
    ~/.zshrc: zsh/zshrc
    ~/.zshenv: zsh/zshenv
    ~/.p10k.zsh: zsh/p10k.zsh
    ~/.actrc: .config/act/.actrc
    ~/.config/git: .config/git
    ~/.config/kitty: .config/kitty
    ~/.config/gh: .config/gh
    ~/.config/yabai: .config/yabai
    ~/.config/skhd: .config/skhd
    ~/.config/mise/config.toml: .config/mise/config.toml
    ~/.config/nvim: .config/nvim
    ~/.config/aerospace: .config/aerospace
    ~/.config/karabiner: .config/karabiner
    ~/.config/ghostty: .config/ghostty
    ~/.config/lazygit: .config/lazygit
    ~/.hammerspoon:
      path: .config/hammerspoon
      force: true
    ~/.config/op/plugins.sh: .config/op/plugins.sh
    ~/Library/Application Support/Cursor/User/settings.json:
      cursor/Library/Application Support/Cursor/User/settings.json
    ~/Library/Application Support/Cursor/User/keybindings.json:
      cursor/Library/Application Support/Cursor/User/keybindings.json
    ~/Library/Application Support/Cursor/User/snippets:
      cursor/Library/Application Support/Cursor/User/snippets
    ~/Library/Application Support/Code/User/settings.json:
      vscode/Library/Application Support/Code/User/settings.json
    ~/Library/Application Support/Code/User/keybindings.json:
      vscode/Library/Application Support/Code/User/keybindings.json
    ~/Library/Application Support/Code/User/tasks.json:
      vscode/Library/Application Support/Code/User/tasks.json
    ~/.config/macos-defaults: .config/macos-defaults
    ~/.config/workmux: .config/workmux
    ~/.local/bin/hotspot: scripts/hotspot
    ~/.local/bin/linear-edit: tools/scripts/src/linear-edit.ts

- create:
    - ~/dev

- shell:
    # Make scripts executable
    - command: chmod +x scripts/*
      description: Making scripts executable
    # NOTE: tmux (TPM + plugins) is set up in the `essentials` step via
    # ./scripts/setup_tmux.zsh, because TPM's plugin installer needs the tmux
    # binary, which isn't installed until then.
