- defaults:
          link:
                  relink: true
                  create: true
          shell:
                  stderr: true
                  stdout: true
                  stdin: true

- clean:
          - "~"
          - "~/.oh-my-zsh/custom/"
          - "~/.oh-my-zsh/custom/plugins/"

- link:
          ~/.tool-versions: asdf/.tool-versions
          ~/.claude/CLAUDE.md: claude/CLAUDE.md
          ~/.claude/settings.json: claude/settings.json
          ~/.tmux.conf: tmux/.tmux.conf
          ~/.zshrc: zsh/zshrc
          ~/.zshenv: zsh/zshenv
          ~/.gitconfig: git/.gitconfig
          ~/.config/kitty/kitty.conf: kitty/kitty.conf
          ~/.config/gh: gh
          ~/.config/yabai: yabai
          ~/.config/skhd: skhd
          ~/.config/nvim: nvim
          ~/.config/op/plugins.sh: op/.config/plugins.sh
          ~/Library/Application Support/Cursor/User/settings.json: cursor/Library/Application Support/Cursor/User/settings.json
          ~/Library/Application Support/Cursor/User/keybindings.json: cursor/Library/Application Support/Cursor/User/keybindings.json
          ~/Library/Application Support/Cursor/User/snippets: cursor/Library/Application Support/Cursor/User/snippets
          ~/Library/Application Support/Code/User/settings.json: vscode/Library/Application Support/Code/User/settings.json
          ~/Library/Application Support/Code/User/keybindings.json: vscode/Library/Application Support/Code/User/keybindings.json
          ~/Library/Application Support/Code/User/tasks.json: vscode/Library/Application Support/Code/User/tasks.json

- create:
          - ~/dev

- shell:
          # Make scripts executable
          - command: chmod +x scripts/*
            description: Making scripts executable

          # Create 1Password config directory with correct permissions
          - command: mkdir -p ~/.config/op && chmod 700 ~/.config/op
            description: Setting up 1Password config directory

          # Run Homebrew setup
          - command: ./scripts/setup_homebrew.zsh

          # Install asdf plugins from .tool-versions
          - command: cat ~/.tool-versions | cut -d' ' -f1 | grep "^[^\#]" | xargs -I {} asdf plugin add {}
            description: Installing asdf plugins

          # Setup 1password CLI (will prompt to integrate CLI in 1password app)
          - command: op account get
          - command: op signin

          # 1password agent setup
          - command: ./scripts/1password_agent_setup.sh
