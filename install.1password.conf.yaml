- defaults:
    shell:
      stderr: true
      stdout: true
      stdin: true

- shell:
    # Set 1Password config directory permissions
    - command: chmod 700 ~/.config/op
      description: Setting up 1Password config directory permissions

    # Setup 1password CLI (will prompt to integrate CLI in 1password app)
    - command: op account get
      description: Checking 1Password account
    - command: op signin
      description: Signing into 1Password

    # 1password agent setup
    - command: ./scripts/1password_agent_setup.sh
      description: Setting up 1Password SSH agent
