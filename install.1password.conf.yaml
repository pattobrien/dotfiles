- defaults:
    shell:
      stderr: true
      stdout: true
      stdin: true

- shell:
    # Ensure the CLI has an account + active session. Guides through the manual
    # desktop-app integration if it isn't enabled yet (chmod of ~/.config/op is
    # handled inside the script).
    - command: ./scripts/1password_cli_signin.sh
      description: Setting up 1Password CLI

    # 1password agent setup
    - command: ./scripts/1password_agent_setup.sh
      description: Setting up 1Password SSH agent
