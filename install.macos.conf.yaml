- defaults:
    shell:
      stderr: true
      stdout: true
      stdin: true

- shell:
    - command: ./scripts/setup_macos.zsh
      description: |
        Applying macOS defaults: YAML configs (macos-defaults) AND shell-based
        scripts in ~/.config/macos-defaults/*.sh (e.g. screenshot save location).
        Note: mouse/trackpad scaling require a logout or restart to take effect.

    - description: |
        Key-repeat speed (see: https://mac-key-repeat.zaymon.dev)
        You must log out or restart after changing these settings.
      command: |
        defaults write -g InitialKeyRepeat -int 12
        defaults write -g KeyRepeat -int 5
        defaults write -g ApplePressAndHoldEnabled -bool false

    - command: ./scripts/setup_touchid_sudo.zsh
      description: Enabling Touch ID for sudo (works in tmux via pam_reattach)

    # TODO: "Reduce Motion" in accessibility settings
